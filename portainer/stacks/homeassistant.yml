version: '3.7'

services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    network_mode: host
    privileged: true  # Needed for some integrations like mDNS/SSDP
    volumes:
      - /volume2/docker/homeassistant/config:/config
      - /volume2/docker/homeassistant/backups:/config/backups
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Europe/London
