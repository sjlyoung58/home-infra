# Z-Wave JS UI — running on Pi 5 (192.168.1.222), not on NAS
# Kept here for reference. Actual stack is managed locally on the Pi via Docker.
#
# Z-Wave JS UI version: 11.5.2 | driver: 15.15.3 | server: 3.2.1
#
# IMPORTANT: WebSocket server is currently DISABLED (serverEnabled: false in settings.json)
# Must be enabled in the Z-Wave JS UI before configuring the HA Z-Wave JS integration.
# WebSocket port when enabled: 3000 → ws://192.168.1.222:3000
#
# Security keys are stored in settings.json on the Pi at:
#   /DockerVolumes/ha/zwave/store/settings.json
# Do NOT commit them. Reference from .env if ever needed here.

version: "3.8"

services:
  zwave-js-ui:
    image: zwavejs/zwave-js-ui:latest
    container_name: zwave-js-ui
    restart: always
    network_mode: host
    privileged: true
    environment:
      - ZWAVEJS_PORT=/dev/ttyUSB0
      - ZWAVEJS_S2_UNAUTHENTICATED_KEY=${ZWAVE_S2_UNAUTHENTICATED_KEY}
      - ZWAVEJS_S2_AUTHENTICATED_KEY=${ZWAVE_S2_AUTHENTICATED_KEY}
      - ZWAVEJS_S2_ACCESS_CONTROL_KEY=${ZWAVE_S2_ACCESS_CONTROL_KEY}
      - ZWAVEJS_S0_LEGACY_KEY=${ZWAVE_S0_LEGACY_KEY}
      - ZWAVEJS_S2_AUTHENTICATED_KEY_LR=${ZWAVE_S2_AUTHENTICATED_KEY_LR}
      - ZWAVEJS_S2_ACCESS_CONTROL_KEY_LR=${ZWAVE_S2_ACCESS_CONTROL_KEY_LR}
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    volumes:
      - /DockerVolumes/ha/zwave/store:/usr/src/app/store
