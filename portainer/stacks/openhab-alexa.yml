version: '3.1'

services:
  openhab:
    image: "openhab/openhab:3.4.1"
    restart: always
    network_mode: host
#    ports:
#      - 7071:7071
#      - 7443:7443
    volumes:
#      - "/etc/localtime:/etc/localtime:ro"
#      - "/etc/timezone:/etc/timezone:ro"
      - "/volume2/docker/openhab/addons:/openhab/addons"
      - "/volume2/docker/openhab/conf:/openhab/conf"
      - "/volume2/docker/openhab/userdata:/openhab/userdata"
    environment:
      CRYPTO_POLICY: "unlimited"
      EXTRA_JAVA_OPTS: "-Duser.timezone=Europe/London"
#      OPENHAB_HTTP_PORT: "8080"
#      OPENHAB_HTTPS_PORT: "8443"
      OPENHAB_HTTP_PORT: "7071"
      OPENHAB_HTTPS_PORT: "7443"
      USER_ID: "1028"
      GROUP_ID: "65536"
